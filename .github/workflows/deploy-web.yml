name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "packages/connect-db/**"
  workflow_dispatch:

env:
  NODE_VERSION: "22.x"
  PNPM_VERSION: "9.15.0"

permissions:
  contents: read

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy getbb.app site to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache Turbo task outputs
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-web-turbo-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-web-turbo-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-web-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # CLOUDFLARE_ENV selects the wrangler env at BUILD time (the
      # @cloudflare/vite-plugin writes the resolved production config to
      # dist/server/wrangler.json; plain `wrangler deploy` follows it).
      - name: Build web (production)
        env:
          CLOUDFLARE_ENV: production
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
        run: pnpm exec turbo run build --filter=@bb/web --cache-dir=.turbo/cache --output-logs=new-only

      - name: Sync marketing analytics secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          LANDING_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
        run: |
          if [ -z "$LANDING_POSTHOG_KEY" ]; then
            echo "VITE_POSTHOG_KEY is required for download tracking."
            exit 1
          fi
          printf '%s' "$LANDING_POSTHOG_KEY" | pnpm --filter @bb/web exec wrangler secret put LANDING_POSTHOG_KEY --name bb-web

      - name: Sync email signup secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "RESEND_API_KEY is required for the email signup."
            exit 1
          fi
          printf '%s' "$RESEND_API_KEY" | pnpm --filter @bb/web exec wrangler secret put RESEND_API_KEY --name bb-web

      # GITHUB_CLIENT_ID / GITHUB_CLIENT_SECRET / BETTER_AUTH_SECRET are set
      # once by hand and intentionally NOT synced from CI.
      - name: Deploy web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm --filter @bb/web exec wrangler deploy
