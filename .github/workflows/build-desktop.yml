name: Build Desktop

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish stable desktop-version.json release assets"
        required: true
        type: boolean
        default: false
      release_channel:
        description: "Release channel. Only stable can update desktop-latest."
        required: true
        type: choice
        default: qa
        options:
          - qa
          - stable

env:
  CSC_IDENTITY_AUTO_DISCOVERY: "false"
  NODE_VERSION: "22.x"
  PNPM_VERSION: "9.15.0"

permissions:
  contents: write

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS unsigned artifacts
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Typecheck desktop and launcher
        run: pnpm exec turbo run typecheck --filter=@bb/desktop --filter=bb-app --output-logs=new-only

      - name: Build desktop
        run: pnpm exec turbo run build --filter=@bb/desktop --output-logs=new-only

      - name: Test desktop and launcher
        run: pnpm exec turbo run test --filter=@bb/desktop --filter=bb-app --force --output-logs=new-only

      - name: Package universal desktop artifacts
        run: pnpm exec turbo run desktop:build --filter=@bb/desktop --force --output-logs=new-only

      - name: Generate desktop version feed
        run: pnpm --dir apps/desktop run desktop:version-feed

      - name: Plan release publication
        id: release_plan
        env:
          INPUT_PUBLISH: ${{ inputs.publish }}
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
          # Binary publication stays disabled until the signing/notarization
          # task removes the unsigned electron-builder config. If signing
          # secrets are absent, stable releases intentionally publish only
          # desktop-version.json and never unsigned .dmg/.zip artifacts.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          ENABLE_DESKTOP_SIGNED_BINARY_RELEASES: ${{ vars.ENABLE_DESKTOP_SIGNED_BINARY_RELEASES }}
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          IS_PRERELEASE="false"
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE="true"
          fi

          SHOULD_PUBLISH="false"
          if [[ "$INPUT_PUBLISH" == "true" && "$RELEASE_CHANNEL" == "stable" && "$IS_PRERELEASE" == "false" ]]; then
            SHOULD_PUBLISH="true"
          fi

          HAS_SIGNING_SECRETS="false"
          if [[ -n "${CSC_LINK:-}" && -n "${CSC_KEY_PASSWORD:-}" && -n "${APPLE_API_KEY:-}" && -n "${APPLE_API_KEY_ID:-}" && -n "${APPLE_API_ISSUER:-}" ]]; then
            HAS_SIGNING_SECRETS="true"
          fi

          PUBLISH_BINARIES="false"
          if [[ "$HAS_SIGNING_SECRETS" == "true" && "$ENABLE_DESKTOP_SIGNED_BINARY_RELEASES" == "true" ]]; then
            PUBLISH_BINARIES="true"
          fi

          {
            echo "version=$VERSION"
            echo "is_prerelease=$IS_PRERELEASE"
            echo "should_publish=$SHOULD_PUBLISH"
            echo "publish_binaries=$PUBLISH_BINARIES"
            echo "has_signing_secrets=$HAS_SIGNING_SECRETS"
          } >> "$GITHUB_OUTPUT"

      - name: Upload desktop workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bb-desktop-macos-universal
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-mac.yml
            apps/desktop/release/desktop-version.json
          if-no-files-found: error

      - name: Publish stable desktop release feed
        if: steps.release_plan.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release_plan.outputs.version }}
          PUBLISH_BINARIES: ${{ steps.release_plan.outputs.publish_binaries }}
        run: |
          set -euo pipefail

          VERSION_TAG="desktop-v${VERSION}"
          LATEST_TAG="desktop-latest"
          RELEASE_DIR="apps/desktop/release"
          METADATA_ASSETS=("$RELEASE_DIR/desktop-version.json")
          RELEASE_ASSETS=("${METADATA_ASSETS[@]}")

          if [[ "$PUBLISH_BINARIES" == "true" ]]; then
            RELEASE_ASSETS+=("$RELEASE_DIR/latest-mac.yml")
            RELEASE_ASSETS+=("$RELEASE_DIR"/*.dmg)
            RELEASE_ASSETS+=("$RELEASE_DIR"/*.zip)
            RELEASE_ASSETS+=("$RELEASE_DIR"/*.blockmap)
          else
            echo "Signing/notarization gate is closed; publishing desktop-version.json only."
          fi

          if gh release view "$VERSION_TAG" >/dev/null 2>&1; then
            echo "Release $VERSION_TAG already exists; refusing to mutate immutable desktop release."
            exit 1
          fi

          gh release create "$VERSION_TAG" "${RELEASE_ASSETS[@]}" \
            --target "$GITHUB_SHA" \
            --title "bb desktop ${VERSION}" \
            --notes "bb desktop ${VERSION}" \
            --latest=false

          git tag -f "$LATEST_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/${LATEST_TAG}"

          if gh release view "$LATEST_TAG" >/dev/null 2>&1; then
            gh release edit "$LATEST_TAG" \
              --target "$GITHUB_SHA" \
              --title "bb desktop latest" \
              --notes "Latest stable bb desktop release metadata." \
              --latest=false

            # desktop-latest is a moving release, but --clobber only replaces
            # assets with matching names. Preserve the release page and reset
            # assets in-place so versioned binaries cannot accumulate and
            # JSON-only publishes cannot leave stale binaries from an older
            # signed release.
            gh release view "$LATEST_TAG" --json assets --jq '.assets[].name' | while IFS= read -r asset_name; do
              if [[ -n "$asset_name" ]]; then
                gh release delete-asset "$LATEST_TAG" "$asset_name" --yes
              fi
            done

            gh release upload "$LATEST_TAG" "${RELEASE_ASSETS[@]}"
          else
            gh release create "$LATEST_TAG" "${RELEASE_ASSETS[@]}" \
              --target "$GITHUB_SHA" \
              --title "bb desktop latest" \
              --notes "Latest stable bb desktop release metadata." \
              --latest=false
          fi

      - name: Summarize
        env:
          IS_PRERELEASE: ${{ steps.release_plan.outputs.is_prerelease }}
          PUBLISH_BINARIES: ${{ steps.release_plan.outputs.publish_binaries }}
          SHOULD_PUBLISH: ${{ steps.release_plan.outputs.should_publish }}
          VERSION: ${{ steps.release_plan.outputs.version }}
        run: |
          {
            echo "## bb desktop artifacts"
            echo
            echo "- universal macOS .dmg, .zip, latest-mac.yml, and desktop-version.json uploaded as workflow artifacts"
            echo "- version: ${VERSION}"
            echo "- prerelease version: ${IS_PRERELEASE}"
            echo "- stable release publication requested and allowed: ${SHOULD_PUBLISH}"
            echo "- release binary upload enabled: ${PUBLISH_BINARIES}"
            echo "- desktop feed URL: https://github.com/ymichael/bb/releases/download/desktop-latest/desktop-version.json"
          } >> "$GITHUB_STEP_SUMMARY"
