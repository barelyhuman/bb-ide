<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Status</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f8fafc;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #d1d5db;
        --accent: #2563eb;
        --soft: #eff6ff;
        --ok: #047857;
        --warn: #b45309;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --panel: #111827;
          --text: #f8fafc;
          --muted: #9ca3af;
          --border: #374151;
          --accent: #60a5fa;
          --soft: #172554;
          --ok: #34d399;
          --warn: #fbbf24;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 16px;
        padding: 16px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 17px;
        font-weight: 650;
      }

      h2 {
        font-size: 12px;
        font-weight: 650;
        letter-spacing: 0;
        text-transform: uppercase;
        color: var(--muted);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 2px 9px;
        background: var(--panel);
        color: var(--muted);
        white-space: nowrap;
      }

      section {
        display: grid;
        gap: 8px;
      }

      .rows {
        display: grid;
        gap: 8px;
      }

      .row {
        display: grid;
        gap: 4px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        padding: 10px;
      }

      .row-title {
        font-weight: 600;
      }

      .row-meta {
        color: var(--muted);
        overflow-wrap: anywhere;
      }

      .empty {
        border: 1px dashed var(--border);
        border-radius: 8px;
        padding: 14px;
        color: var(--muted);
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      textarea {
        min-height: 38px;
        max-height: 160px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        background: var(--panel);
        color: var(--text);
        font: inherit;
      }

      button {
        border: 1px solid var(--accent);
        border-radius: 8px;
        padding: 0 12px;
        background: var(--accent);
        color: white;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        cursor: default;
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Status</h1>
        <span class="pill" id="landing-mode">pr</span>
      </header>

      <section>
        <h2>Pull Requests</h2>
        <div class="rows" id="prs"></div>
      </section>

      <section>
        <h2>Workers</h2>
        <div class="rows" id="workers"></div>
      </section>

      <form id="message-form">
        <textarea id="message-text" placeholder="Message the manager"></textarea>
        <button type="submit">Send</button>
      </form>
    </main>

    <script>
      var state = { prefs: { landingMode: "pr" }, prs: [], workers: [] };

      function text(value) {
        return value === null || value === undefined ? "" : String(value);
      }

      function renderRows(element, rows, emptyText, title) {
        element.textContent = "";
        if (!Array.isArray(rows) || rows.length === 0) {
          var empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = emptyText;
          element.appendChild(empty);
          return;
        }
        rows.forEach(function (row) {
          var item = document.createElement("article");
          item.className = "row";
          var itemTitle = document.createElement("div");
          itemTitle.className = "row-title";
          itemTitle.textContent = title(row);
          var meta = document.createElement("div");
          meta.className = "row-meta";
          meta.textContent = [row.state, row.updatedAt, row.threadId, row.url]
            .map(text)
            .filter(Boolean)
            .join(" - ");
          item.appendChild(itemTitle);
          if (meta.textContent) item.appendChild(meta);
          element.appendChild(item);
        });
      }

      function render() {
        document.getElementById("landing-mode").textContent =
          text(state.prefs && state.prefs.landingMode) || "pr";
        renderRows(
          document.getElementById("prs"),
          state.prs,
          "No pull requests tracked",
          function (row) {
            return row.number ? "#" + row.number + " " + text(row.title) : text(row.title || row.url);
          }
        );
        renderRows(
          document.getElementById("workers"),
          state.workers,
          "No workers tracked",
          function (row) {
            return text(row.description || row.threadId);
          }
        );
      }

      function install() {
        if (!window.bb || !window.bb.data) {
          render();
          return;
        }
        window.bb.data.onChange("state.json", function (event) {
          if (!event.deleted && event.value && typeof event.value === "object") {
            state = event.value;
          }
          render();
        });
        var form = document.getElementById("message-form");
        var input = document.getElementById("message-text");
        form.addEventListener("submit", function (event) {
          event.preventDefault();
          var message = input.value.trim();
          if (!message || !window.bb.message) return;
          form.querySelector("button").disabled = true;
          window.bb.message(message).then(
            function () {
              input.value = "";
              form.querySelector("button").disabled = false;
            },
            function () {
              form.querySelector("button").disabled = false;
            }
          );
        });
      }

      render();
      install();
    </script>
  </body>
</html>
