<!doctype html>
<html lang="en" class="bb-app-shell-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" id="theme-color" />
    <!-- iOS ignores the manifest's display mode, so these opt the home-screen
         app into standalone (chrome-less) launch. Status-bar style is left at
         the default (opaque, non-overlapping) on purpose: black-translucent
         renders content under the status bar, which needs viewport-fit=cover
         plus top safe-area-inset padding the app does not yet have. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="bb" />
    <title>bb</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32x32.png"
      id="favicon-32"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16x16.png"
      id="favicon-16"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png"
      id="apple-touch-icon"
    />
    <link rel="manifest" href="/manifest.webmanifest" id="app-manifest" />
    <script>
      (function () {
        var dev = "%MODE%" === "development";
        function setFavicon(dark) {
          var s = dev ? "-dev" : dark ? "-dark" : "";
          document.getElementById("favicon-32").href =
            "/favicon-32x32" + s + ".png";
          document.getElementById("favicon-16").href =
            "/favicon-16x16" + s + ".png";
        }
        var mq = window.matchMedia("(prefers-color-scheme: dark)");
        setFavicon(mq.matches);
        if (!dev)
          mq.addEventListener("change", function (e) {
            setFavicon(e.matches);
          });
        function getFaviconColorSuffix() {
          try {
            var color = localStorage.getItem("bb.faviconColor");
            return /^(red|orange|yellow|green|teal|blue|purple|pink)$/.test(
              color,
            )
              ? "-" + color
              : "";
          } catch {
            return "";
          }
        }
        var faviconColorSuffix = getFaviconColorSuffix();
        document.getElementById("app-manifest").href =
          "/manifest" + faviconColorSuffix + ".webmanifest";
        document.getElementById("apple-touch-icon").href =
          "/apple-touch-icon" + faviconColorSuffix + ".png";
        // Pre-paint browser-chrome color so PWA/status-bar chrome doesn't
        // flash the wrong shade before the app boots; useTheme.ts owns the
        // meta tag afterwards. Mirrors the bb.theme preference resolution and
        // the --canvas values in theme.css (#151515 = oklch(0.195 0 0)).
        var theme = localStorage.getItem("bb.theme");
        var darkTheme = theme === "dark" || (theme !== "light" && mq.matches);
        document.getElementById("theme-color").content = darkTheme
          ? "#151515"
          : "#ffffff";
      })();
    </script>
  </head>
  <body class="bb-app-shell">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
